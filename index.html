<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f5ee" />
    <title>翻面</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="input">
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <span>翻面</span>
        </div>
        <button class="ghost-button" id="historyButton" type="button">往回看</button>
      </header>

      <section class="panel input-panel" id="inputPanel">
        <div class="eyebrow">今天要翻哪一面？</div>
        <textarea
          id="worryInput"
          maxlength="800"
          placeholder="写一件具体烦心事。比如：今天想打麻将，但我爸不想玩，三缺一。"
        ></textarea>
        <div class="input-meta">
          <span>具体地写，才翻得准</span>
          <span id="counter">0/800</span>
        </div>
        <button class="primary-button" id="flipButton" type="button">
          <span id="buttonText">翻面</span>
          <span class="spinner" id="spinner" aria-hidden="true"></span>
        </button>
        <div class="samples">
          <button type="button" data-sample="今天本来想早点睡，结果刷手机刷到很晚，睡前又开始后悔。">
            熬夜后悔
          </button>
          <button type="button" data-sample="每次和婆婆打电话，她都会暗示一些让我不舒服的话，让我越来越不想打。">
            家庭压力
          </button>
          <button type="button" data-sample="今天点外卖等了很久，送到的时候饭都有点凉了，感觉很烦。">
            外卖变凉
          </button>
        </div>
      </section>

      <section class="panel result-panel hidden" id="resultPanel" aria-live="polite">
        <div class="result-head">
          <span>好的一面</span>
          <button class="ghost-button" id="newButton" type="button">再写一件</button>
        </div>
        <ol class="benefits" id="benefitsList"></ol>
        <div class="next-step">
          <span>下一步</span>
          <p id="nextStepText"></p>
        </div>
        <button class="flip-card" id="cardButton" type="button">
          <span>点一下，翻到另一面</span>
          <strong id="flipLineText"></strong>
        </button>
      </section>

      <section class="final-screen hidden" id="finalPanel" aria-live="polite">
        <div class="final-mark" aria-hidden="true"></div>
        <p class="final-kicker">翻面完成</p>
        <h1 id="finalLineText"></h1>
        <p class="final-copy">
          不是每件事都会马上变好，但你已经看见了另一面。把注意力收回自己身上，
          做下一件小事，生活就会重新往前走。
        </p>
        <button class="primary-button light-button" id="finalNewButton" type="button">写下一件</button>
      </section>
    </main>

    <dialog class="history-dialog" id="historyDialog">
      <div class="dialog-head">
        <strong>翻面记录</strong>
        <button class="ghost-button" id="closeHistoryButton" type="button">关闭</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </dialog>

    <script src="./client.js" type="module"></script>
  </body>
</html>
